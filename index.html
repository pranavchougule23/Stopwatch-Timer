<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stopwatch & Timer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>⏱️ Stopwatch & Timer</h1>

    <!-- Stopwatch -->

    <div class="card">

        <h2>Stopwatch</h2>

        <h1 id="display">00:00:00</h1>

        <div class="buttons">

            <button id="startBtn">
                Start
            </button>

            <button id="pauseBtn">
                Pause
            </button>

            <button id="resetBtn">
                Reset
            </button>

        </div>

        <button id="lapBtn" class="lap-btn">
            Lap
        </button>

        <div id="laps">

        </div>

    </div>

    <!-- Countdown Timer -->

    <div class="card">

        <h2>Countdown Timer</h2>

        <input
            type="number"
            id="minutes"
            placeholder="Minutes">

        <input
            type="number"
            id="seconds"
            placeholder="Seconds">

        <button id="timerBtn">
            Start Timer
        </button>

        <h2 id="timerDisplay">
            00:00
        </h2>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
